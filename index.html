<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Coffe Corner Game</title>
    <script
      src="https://kit.fontawesome.com/c88c89023a.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <header>
      <div class="line">
        <div class="blue" style="background-color: #4285f4"></div>
        <div class="red" style="background-color: #ea4335"></div>
        <div class="yellow" style="background-color: #fbbc04"></div>
        <div class="green" style="background-color: #34a853"></div>
      </div>
      <nav>
        <div class="right-side">
          <div class="circles">
            <i class="fa-solid fa-circle" style="color: #4285f4"></i>
            <i class="fa-solid fa-circle" style="color: #ea4335"></i>
            <i class="fa-solid fa-circle" style="color: #fbbc04"></i>
            <i class="fa-solid fa-circle" style="color: #34a853"></i>
          </div>
          <div class="logo">GDG<span>.Games</span></div>
        </div>
      </nav>
    </header>
    <main>
      <div class="container">
        <h1><span class="G">G</span>D<span class="G">G</span>-Hints</h1>
        <div class="line">
          <div class="blue" style="background-color: #4285f4"></div>
          <div class="red" style="background-color: #ea4335"></div>
          <div class="yellow" style="background-color: #fbbc04"></div>
          <div class="green" style="background-color: #34a853"></div>
        </div>
        <form id="registerForm">
          <label for="">Full Name</label>
          <input type="text" id="name" placeholder="Enter Your Name" required />
          <label for="">Phone Number</label>
          <input
            type="text"
            id="phone"
            placeholder="Enter Your Phone Number"
            required
          />
          <label for="">Committee</label>
          <select name="" id="committee">
            <option value="" disabled selected>Select Your Committee</option>
            <option value="HR">HR</option>
            <option value="PR">PR</option>
            <option value="Media">Media</option>
            <option value="Logistic">Logistics</option>
            <option value="Technical">Technical</option>
          </select>
          <button type="submit" id="Start">Start</button>
        </form>
      </div>
      <div class="ramadan-kareem">
        <span>Ramadan Kareem</span>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
